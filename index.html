<script>
        /* ===============================
       TELEPORT
    =============================== */
    AFRAME.registerComponent('teleport', {
      init: function () {
        this.el.addEventListener('click', () => {
          const target = this.el.getAttribute('data-target');
          if (target) {
            const isVR = this.el.sceneEl.is('vr-mode');
            const finalURL = isVR ? target + "?vr=true" : target;
            window.location.href = finalURL;
          } else {
            const rig = document.querySelector('#rig');
            const p = this.el.getAttribute('position');
            rig.setAttribute('position', { x: p.x, y: 2, z: p.z });
          }
        });
      }
    });
    /*================================
    DOOR FOCUS  
    ================================*/
    AFRAME.registerComponent('door-focus', {
    schema: {
        targetx: {type: 'number'},
        targetz: {type: 'number'}
    },
    init: function () {
        let timer;
        this.el.addEventListener('mouseenter', () => {
            timer = setTimeout(() => {
                const rig = document.querySelector('#rig');
                rig.setAttribute('position', {
                    x: this.data.targetx,
                    y: 3, // Keep the current Y position for a smoother transition  
                    z: this.data.targetz
                });
            }, 2000); // 2 seconds
        });
        this.el.addEventListener('mouseleave', () => {
            clearTimeout(timer);
        });
    }
});
AFRAME.registerComponent('video-gaze', {
  init: function () {
    const video = document.querySelector('#museumVideo');
    let timer;
    this.el.addEventListener('mouseenter', () => {
      timer = setTimeout(() => {
        video.muted = false;   // enable sound
        video.play();
      },1500);
    });
    this.el.addEventListener('mouseleave', () => {
      clearTimeout(timer);
      video.pause();
    });
  }
});
AFRAME.registerComponent('gate-focus', {
  schema: {
    targetx: {type: 'number'},
    targetz: {type: 'number'}
  },

  init: function () {
    this.el.addEventListener('click', () => {
      const rig = document.querySelector('#rig');
      rig.setAttribute('position', {
        x: this.data.targetx,
        y: rig.object3D.position.y,
        z: this.data.targetz
      });
    });
  }
});
</script>
